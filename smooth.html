<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta http-equiv="X-UA-Compatible" content="IE=edge">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <link rel="stylesheet" href="mediaelementplayer.css" />
  <title>Document</title>
  <style>
@import url('https://fonts.googleapis.com/css2?family=Poppins:wght@100;200;300;400;500;600&display=swap');

*{
   font-family: 'Poppins', sans-serif;
   margin:0; padding:0;
   box-sizing: border-box;
   outline: none; border:none;
   text-decoration: none;
   text-transform: capitalize;
}

body{
   background-color: coral;
}

.container{
   max-width: 1200px;
   margin:100px auto;
   display: flex;
   flex-wrap: wrap;
   align-items: flex-start;
   gap:20px;
}

.container .main-video-container{
   flex:1 1 700px;
   border-radius: 5px;
   box-shadow: 0 5px 15px rgba(0,0,0,.1);
   background-color: #fff;
   padding:15px;
}

.container .main-video-container iframe{
   margin-bottom: 7px;
   border-radius: 5px;
   width: 100%;
   height:415px;
}
@media(min-width:800px)
{
   .container .main-video-container iframe{
   margin-bottom: 7px;
   border-radius: 5px;
   width: 100%;
   height:600px;
}
}

@media(min-width:1110px)
{
   .container .main-video-container iframe{
   margin-bottom: 7px;
   border-radius: 5px;
   width: 100%;
   height:415px;
}
}
.container .main-video-container .main-vid-title{
   font-size: 20px;
   color:#444;
}

.container .video-list-container{
   flex:1 1 350px;
   height: 485px;
   overflow-y: scroll;
   border-radius: 5px;
   box-shadow: 0 5px 15px rgba(0,0,0,.1);
   background-color: #fff;
   padding:15px;
}

.container .video-list-container::-webkit-scrollbar{
   width: 10px;
}

.container .video-list-container::-webkit-scrollbar-track{
   background-color: #fff;
   border-radius: 5px;
}

.container .video-list-container::-webkit-scrollbar-thumb{
   background-color: #444;
   border-radius: 5px;
}

.container .video-list-container .list{
   display: flex;
   align-items: center;
   gap:15px;
   padding:10px;
   background-color: #eee;
   cursor: pointer;
   border-radius: 5px;
   margin-bottom: 10px;
}

.container .video-list-container .list:last-child{
   margin-bottom: 0;
}

.container .video-list-container .list.active{
   background-color: #444;
}

.container .video-list-container .list.active .list-title{
   color:#fff;
}

.container .video-list-container .list iframe{
   width: 120px;
   height: 70px;
   border-radius: 5px;
}

.container .video-list-container .list .list-title{
   font-size: 17px;
   color:#444;
}
  </style>
</head>
<body>
  <div class="container">
   
   <div class="main-video-container">
         <iframe src="https://www.youtube.com/embed/UBGysWjH-jA"></iframe>
      <h3 class="main-vid-title">All matches AFC CUP 2021</h3>
   </div>

   <div class="video-list-container">

      <div class="list active">
         <iframe  src="https://www.youtube.com/embed/kXF4q5gLzBQ" ></iframe>
         <h3 class="list-title">Cameroon vs Egypt</h3>
      </div>

      <div class="list">
         <iframe  src="https://www.youtube.com/embed/RXFuWOd1hkA"></iframe>
         <h3 class="list-title">Senegal vs Egypt</h3>
      </div>
      <div class="list">
         <iframe  src="https://www.youtube.com/embed/k9CpmJp1Uqo"></iframe>
         <h3 class="list-title">Egypt vs Morocco</h3>
      </div>
      <div class="list">
         <iframe  src="https://www.youtube.com/embed/n-JDXzJLqLk"></iframe>
         <h3 class="list-title">Burkina Faso vs Senegal Highlight</h3>
      </div>
      <div class="list">
         <iframe  src="https://www.youtube.com/embed/2-gnJnl6nbY"></iframe>
         <h3 class="list-title">Senegal vs Equatorial Guinea</h3>
      </div>
      
   </div>

</div>

  <script>
let videoList = document.querySelectorAll('.video-list-container .list');

videoList.forEach(vid =>{
   vid.onclick = () =>{
      videoList.forEach(remove =>{remove.classList.remove('active')});
      vid.classList.add('active');
      let src = vid.querySelector('iframe').src;
      let title = vid.querySelector('.list-title').innerHTML;
      document.querySelector('.main-video-container iframe').src = src;
      document.querySelector('.main-video-container iframe').play();
      document.querySelector('.main-video-container .main-vid-title').innerHTML = title;
   };
});
  </script>
</body>
</html>
